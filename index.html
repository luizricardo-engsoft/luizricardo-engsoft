<head>

<body style="
  margin:0;
  background:#080808;
  color:#f0f0f0;

  display:flex;
  flex-direction:column;
  align-items:center;
  padding:40px 16px;
">

<div style="width:100%; max-width:400px; text-align:center;">

  <!-- AVATAR -->
  <div style="
    position:relative;
    width:76px;
    height:76px;
    border-radius:50%;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.18);
    background:#111;
    margin:0 auto 6px;
  ">

    <img 
      src="https://i.pinimg.com/736x/6d/43/2a/6d432a5422e7daf8dbb2f55ae1b74206.jpg"
      style="width:100%; height:100%; object-fit:cover;"
    >

    <!-- NARIZ -->
    <div id="nose" style="
      position:absolute;
      width:12px;
      height:12px;
      border-radius:50%;
      top:34px;
      left:32px;
      cursor:pointer;
      transition:0.15s;
    "></div>

  </div>

  <!-- HINT DISCRETA -->
  <div style="
    font-size:10px;
    color:#333;
    margin-bottom:14px;
    user-select:none;
  ">
    clique no detalhe 👀
  </div>

  <!-- ÁUDIOS -->
  <audio id="squeak" src="squeak.mp3"></audio>
  <audio id="altSound" src="alt.mp3"></audio>

  <!-- NOME -->
  <div style="font-size:20px; font-weight:bold;">
    @luisricardo.dev
  </div>

  <!-- BIO -->
  <div style="font-size:12px; color:#777; margin:8px 0 24px;">
    sistemas de informação · projetos reais
  </div>

  <!-- LINKS -->
  <div style="display:flex; flex-direction:column; gap:10px;">

    <a href="https://instagram.com/luisricardo.dev" target="_blank" style="padding:12px; background:#111; border:1px solid #222; border-radius:8px; text-decoration:none; color:#fff;">
      📱 Instagram
    </a>

    <a href="https://pin.it/4TDXnlbeu" target="_blank" style="padding:12px; background:#111; border:1px solid #222; border-radius:8px; text-decoration:none; color:#fff;">
      📌 Pinterest
    </a>

    <a href="https://music.youtube.com/@th.oyasuumii" target="_blank" style="padding:12px; background:#111; border:1px solid #222; border-radius:8px; text-decoration:none; color:#fff;">
      🎧 YouTube Music
    </a>

    <a href="https://open.spotify.com/user/uvdtunh9f618fegc0hd1ep4ue" target="_blank" style="padding:12px; background:#111; border:1px solid #222; border-radius:8px; text-decoration:none; color:#fff;">
      🎵 Spotify
    </a>

    <a href="https://github.com/luizricardo-engsoft" target="_blank" style="padding:12px; background:#111; border:1px solid #222; border-radius:8px; text-decoration:none; color:#fff;">
      💻 GitHub
    </a>

    <div style="padding:12px; background:#111; border:1px solid #222; border-radius:8px;">
      💬 Discord: th.lurii
    </div>

    <a href="mailto:luisricardo12278@gmail.com" style="padding:12px; background:#111; border:1px solid #222; border-radius:8px; text-decoration:none; color:#fff;">
      ✉️ Email
    </a>

  </div>

  <!-- FOOTER -->
  <div style="margin-top:20px; font-size:10px; color:#333;">
    feito por mim
  </div>

</div>

<script>
const nose = document.getElementById("nose");
const squeak = document.getElementById("squeak");
const alt = document.getElementById("altSound");

let clicks = 0;
let timeout;

nose.addEventListener("mouseenter", () => {
  nose.style.boxShadow = "0 0 6px rgba(255,255,255,0.3)";
});

nose.addEventListener("mouseleave", () => {
  nose.style.boxShadow = "none";
});

nose.addEventListener("click", () => {
  clicks++;

  clearTimeout(timeout);
  timeout = setTimeout(() => clicks = 0, 1200);

  // som normal
  squeak.currentTime = 0;
  squeak.play();

  // efeito visual
  nose.style.transform = "scale(1.4)";
  setTimeout(() => nose.style.transform = "scale(1)", 120);

  // easter egg: 5 cliques rápidos
  if (clicks >= 5) {
    alt.currentTime = 0;
    alt.play();

    document.body.style.background = "#111";
    setTimeout(() => {
      document.body.style.background = "#080808";
    }, 150);

    clicks = 0;
  }
});
</script>

</body>
</html>
