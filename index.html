<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@luisricardo.dev — system</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

@keyframes blink-red {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
}

@keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100%); }
}

body {
    margin: 0;
    background: #050505;
    color: #dcdcdc;
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
    overflow-x: hidden;
}

/* SCANLINE EFFECT */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: linear-gradient(
        rgba(255,255,255,0.03) 50%,
        transparent 50%
    );
    background-size: 100% 4px;
    pointer-events: none;
}

/* CONTAINER */
.container {
    width: 100%;
    max-width: 400px;
    text-align: center;
}

/* AVATAR */
.avatar {
    position: relative;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 10px;
    border: 1px solid #222;
    box-shadow: 0 0 15px rgba(255,0,0,0.2);
}

.avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* CLICK AREA */
#nose {
    position: absolute;
    width: 16px;
    height: 16px;
    top: 40px;
    left: 36px;
    cursor: pointer;
}

/* TEXT */
.username {
    font-size: 18px;
    color: #fff;
}

.bio {
    font-size: 12px;
    color: #777;
    margin: 6px 0 20px;
}

.tip {
    font-size: 10px;
    color: #444;
    margin-bottom: 10px;
}

/* MUSIC BAR */
.music-label {
    font-size: 10px;
    color: #555;
    margin-bottom: 6px;
}

.music-bar {
    height: 8px;
    background: #111;
    border: 1px solid #222;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 24px;
    cursor: pointer;
}

.music-progress {
    height: 100%;
    width: 100%;
    background: #666;
    transition: width 0.1s linear;
}

.critical {
    background: red !important;
    animation: blink-red 0.4s infinite;
}

/* LINKS */
.links {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.link {
    padding: 14px;
    background: #0b0b0b;
    border: 1px solid #1a1a1a;
    border-radius: 6px;
    color: #ccc;
    text-decoration: none;
    transition: 0.2s;
    position: relative;
}

.link:hover {
    background: #111;
    border-color: #333;
    color: #fff;
}

/* warning strip */
.link::before {
    content: "SYSTEM LINK";
    position: absolute;
    top: -8px;
    left: 10px;
    font-size: 8px;
    color: #444;
}

/* FOOTER */
.footer {
    margin-top: 30px;
    font-size: 10px;
    color: #333;
}

/* OVERLAY */
#meme-overlay {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#meme-overlay img {
    max-width: 90%;
}
</style>
</head>

<body>

<div class="container">

    <div class="avatar">
        <img src="https://i.pinimg.com/736x/6d/43/2a/6d432a5422e7daf8dbb2f55ae1b74206.jpg">
        <div id="nose"></div>
    </div>

    <div class="tip">[ hidden trigger ]</div>

    <div class="username">@luisricardo.dev</div>
    <div class="bio">system: online · monitoring links</div>

    <div class="music-label">MUSIC BOX STATUS</div>
    <div class="music-bar" id="musicBox">
        <div class="music-progress" id="musicProgress"></div>
    </div>

    <div class="links">
        <a href="https://www.instagram.com/luisricardo.dev/" target="_blank" class="link">📱 Instagram</a>
        <a href="https://pin.it/4TDXnlbeu" target="_blank" class="link">📌 Pinterest</a>
        <a href="https://music.youtube.com/@th.oyasuumii" target="_blank" class="link">🎧 YouTube Music</a>
        <a href="https://open.spotify.com/user/uvdtunh9f618fegc0hd1ep4ue" target="_blank" class="link">🎵 Spotify</a>
        <a href="https://github.com/luizricardo-engsoft" target="_blank" class="link">💻 GitHub</a>
        <div class="link">💬 Discord: th.lurii</div>
        <a href="mailto:luisricardo12278@gmail.com" class="link">✉️ Email</a>
    </div>

    <div class="footer">system build by you</div>
</div>

<div id="meme-overlay">
    <img src="https://media1.tenor.com/m/RaMKetcZVCAAAAAd/fnaf-2-puppet-gangnam-style.gif">
    <p style="color:red;">SYSTEM FAILURE</p>
</div>

<script>
let music = 100;
let playing = false;

const bar = document.getElementById("musicProgress");
const overlay = document.getElementById("meme-overlay");

setInterval(() => {
    if (!playing) {
        music -= 0.5;
        bar.style.width = music + "%";

        if (music < 30) {
            bar.classList.add("critical");
        }

        if (music <= 0) {
            overlay.style.display = "flex";
            playing = true;
        }
    }
}, 100);

document.getElementById("musicBox").onclick = () => {
    music = Math.min(music + 25, 100);
    bar.style.width = music + "%";
};
</script>

</body>
</html>
