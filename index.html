<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@luisricardo.dev — system</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

@keyframes blink-red {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
}

body {
    margin: 0;
    background: #050505;
    color: #dcdcdc;
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
}

/* container */
.container {
    width: 100%;
    max-width: 400px;
    text-align: center;
}

/* avatar */
.avatar {
    position: relative;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 10px;
    border: 1px solid #222;
}

.avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#nose {
    position: absolute;
    width: 16px;
    height: 16px;
    top: 40px;
    left: 36px;
    cursor: pointer;
}

/* textos */
.username { font-size: 18px; }
.bio { font-size: 12px; color: #777; margin-bottom: 20px; }

/* barra */
.music-bar {
    height: 8px;
    background: #111;
    border: 1px solid #222;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 24px;
    cursor: pointer;
}

.music-progress {
    height: 100%;
    width: 100%;
    background: #666;
    transition: width 0.1s linear;
}

.critical {
    background: red !important;
    animation: blink-red 0.4s infinite;
}

/* links */
.links {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.link {
    padding: 14px;
    background: #0b0b0b;
    border: 1px solid #1a1a1a;
    border-radius: 6px;
    color: #ccc;
    text-decoration: none;
    transition: 0.2s;
}

.link:hover {
    background: #111;
    border-color: #333;
}

/* overlay */
#meme-overlay {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
}

#meme-overlay img {
    max-width: 90%;
}

.footer {
    margin-top: 25px;
    font-size: 10px;
    color: #333;
}
</style>
</head>

<body>

<div class="container">

    <div class="avatar">
        <img src="https://i.pinimg.com/736x/6d/43/2a/6d432a5422e7daf8dbb2f55ae1b74206.jpg">
        <div id="nose"></div>
    </div>

    <div class="username">@luisricardo.dev</div>
    <div class="bio">system monitoring...</div>

    <div class="music-bar" id="musicBox">
        <div class="music-progress" id="musicProgress"></div>
    </div>

    <div class="links">
        <a href="https://www.instagram.com/luisricardo.dev/" target="_blank" rel="noopener noreferrer" class="link">📱 Instagram</a>
        <a href="https://pin.it/4TDXnlbeu" target="_blank" rel="noopener noreferrer" class="link">📌 Pinterest</a>
        <a href="https://music.youtube.com/@th.oyasuumii" target="_blank" rel="noopener noreferrer" class="link">🎧 YouTube Music</a>
        <a href="https://open.spotify.com/user/uvdtunh9f618fegc0hd1ep4ue" target="_blank" rel="noopener noreferrer" class="link">🎵 Spotify</a>
        <a href="https://github.com/luizricardo-engsoft" target="_blank" rel="noopener noreferrer" class="link">💻 GitHub</a>
        <div class="link">💬 Discord: th.lurii</div>
        <a href="mailto:luisricardo12278@gmail.com" class="link">✉️ Email</a>
    </div>

    <div class="footer">system build by you</div>
</div>

<div id="meme-overlay">
    <img id="puppet-gif" src="https://media1.tenor.com/m/RaMKetcZVCAAAAAd/fnaf-2-puppet-gangnam-style.gif">
    <p style="color:red;">SYSTEM FAILURE</p>
</div>

<!-- ÁUDIOS -->
<audio id="squeak" src="soundfreddy.mp3"></audio>
<audio id="altSound" src="hor hor hor hor.freddy.mp3"></audio>
<audio id="puppetMusic" src="puppet_music.mp3" loop></audio>
<audio id="puppetDancing" src="puppet_dancing.mp3"></audio>

<script>
const nose = document.getElementById("nose");
const squeak = document.getElementById("squeak");
const alt = document.getElementById("altSound");
const puppetMusic = document.getElementById("puppetMusic");
const puppetDancing = document.getElementById("puppetDancing");
const bar = document.getElementById("musicProgress");
const overlay = document.getElementById("meme-overlay");

let clicks = 0;
let music = 100;
let started = false;
let meme = false;

/* 🔓 DESBLOQUEAR ÁUDIO */
document.addEventListener("click", () => {
    const audios = [squeak, alt, puppetMusic, puppetDancing];

    audios.forEach(a => {
        a.muted = true;
        a.play().then(() => {
            a.pause();
            a.currentTime = 0;
            a.muted = false;
        }).catch(()=>{});
    });

    puppetMusic.play().catch(()=>{});
}, { once: true });

/* 👃 NARIZ */
nose.addEventListener("click", () => {
    squeak.currentTime = 0;
    squeak.play().catch(()=>{});

    clicks++;

    if (clicks >= 5) {
        alt.currentTime = 0;
        alt.play().catch(()=>{});
        clicks = 0;
    }
});

/* 🎵 MUSIC BOX */
setInterval(() => {
    if (!meme) {
        music -= 0.45;
        bar.style.width = music + "%";

        if (music < 30) {
            bar.classList.add("critical");
        } else {
            bar.classList.remove("critical");
        }

        if (music <= 0) {
            trigger();
        }
    }
}, 100);

document.getElementById("musicBox").addEventListener("click", () => {
    if (!meme) {
        music = Math.min(music + 25, 100);
        bar.style.width = music + "%";
    }
});

/* 💀 MEME EVENT */
function trigger() {
    meme = true;
    puppetMusic.pause();

    const gif = document.getElementById("puppet-gif");
    gif.src = gif.src;

    puppetDancing.currentTime = 0;
    puppetDancing.play().catch(()=>{});

    overlay.style.display = "flex";
}

puppetDancing.addEventListener("ended", () => {
    overlay.style.display = "none";
    music = 100;
    meme = false;
    puppetMusic.play().catch(()=>{});
});
</script>

</body>
</html>
