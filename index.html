<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@luisricardo.dev — links</title>

<style>
@keyframes blink-red {
    0% { background: #444; }
    50% { background: #ff0000; box-shadow: 0 0 12px #ff0000; }
    100% { background: #444; }
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #080808;
    color: #f0f0f0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px;
    overflow-x: hidden;
    transition: background 0.2s;
}

/* CONTAINER */
.container {
    width: 100%;
    max-width: 400px;
    text-align: center;
}

/* AVATAR */
.avatar-container {
    position: relative;
    width: 82px;
    height: 82px;
    border-radius: 50%;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.15);
    background: #111;
    margin: 0 auto 8px;
}

.avatar-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* NARIZ CLICK */
#nose {
    position: absolute;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    top: 36px;
    left: 34px;
    cursor: pointer;
    z-index: 10;
}

/* TEXTOS */
.username {
    font-size: 20px;
    font-weight: 600;
}

.bio {
    font-size: 13px;
    color: #777;
    margin: 8px 0 22px;
}

.tip {
    font-size: 10px;
    color: #333;
    margin-bottom: 14px;
}

/* MUSIC BAR */
.music-box-label {
    font-size: 10px;
    color: #444;
    margin-bottom: 6px;
    letter-spacing: 1px;
}

#music-box-container {
    width: 100%;
    height: 10px;
    background: #111;
    border: 1px solid #222;
    border-radius: 6px;
    margin-bottom: 24px;
    cursor: pointer;
    overflow: hidden;
}

#music-box-bar {
    width: 100%;
    height: 100%;
    background: #444;
    transition: width 0.1s linear;
}

.critical-alert {
    animation: blink-red 0.3s infinite;
}

/* LINKS */
.links-gap {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.link-card {
    padding: 14px;
    background: #111;
    border: 1px solid #222;
    border-radius: 10px;
    text-decoration: none;
    color: #fff;
    transition: all 0.2s ease;
    display: block;
}

.link-card:hover {
    background: #161616;
    border-color: #444;
    transform: translateY(-2px);
}

/* OVERLAY */
#meme-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
}

#meme-overlay img {
    max-width: 90%;
    max-height: 70%;
    border-radius: 10px;
}

.footer {
    margin-top: 28px;
    font-size: 11px;
    color: #333;
}
</style>
</head>

<body>

<div class="container">

    <div class="avatar-container">
        <img src="https://i.pinimg.com/736x/6d/43/2a/6d432a5422e7daf8dbb2f55ae1b74206.jpg" class="avatar-img">
        <div id="nose"></div>
    </div>

    <div class="tip">clique no detalhe 👀</div>

    <div class="username">@luisricardo.dev</div>
    <div class="bio">sistemas de informação · projetos reais</div>

    <div class="music-box-label">Wind Up Music Box</div>
    <div id="music-box-container">
        <div id="music-box-bar"></div>
    </div>

    <div class="links-gap">

        <a href="https://www.instagram.com/luisricardo.dev/" target="_blank" rel="noopener noreferrer" class="link-card">📱 Instagram</a>

        <a href="https://pin.it/4TDXnlbeu" target="_blank" rel="noopener noreferrer" class="link-card">📌 Pinterest</a>

        <a href="https://music.youtube.com/@th.oyasuumii" target="_blank" rel="noopener noreferrer" class="link-card">🎧 YouTube Music</a>

        <!-- ✅ SPOTIFY CORRIGIDO -->
        <a href="https://open.spotify.com/user/uvdtunh9f618fegc0hd1ep4ue" target="_blank" rel="noopener noreferrer" class="link-card">🎵 Spotify</a>

        <a href="https://github.com/luizricardo-engsoft" target="_blank" rel="noopener noreferrer" class="link-card">💻 GitHub</a>

        <div class="link-card" style="cursor:default;">💬 Discord: th.lurii</div>

        <a href="mailto:luisricardo12278@gmail.com" class="link-card">✉️ Email</a>

    </div>

    <div class="footer">feito por mim</div>
</div>

<div id="meme-overlay">
    <img id="puppet-gif" src="https://media1.tenor.com/m/RaMKetcZVCAAAAAd/fnaf-2-puppet-gangnam-style.gif">
    <p style="color:red; font-weight:bold; margin-top:20px;">SISTEMA CORROMPIDO</p>
</div>

<audio id="squeak" src="soundfreddy.mp3"></audio>
<audio id="altSound" src="hor hor hor hor.freddy.mp3"></audio>
<audio id="puppetMusic" src="puppet_music.mp3" loop></audio>
<audio id="puppetDancing" src="puppet_dancing.mp3"></audio>

<script>
const nose = document.getElementById("nose");
const squeak = document.getElementById("squeak");
const alt = document.getElementById("altSound");
const puppetMusic = document.getElementById("puppetMusic");
const puppetDancing = document.getElementById("puppetDancing");
const musicBar = document.getElementById("music-box-bar");
const memeOverlay = document.getElementById("meme-overlay");
const puppetGif = document.getElementById("puppet-gif");

let clicks = 0;
let musicLevel = 100;
let musicStarted = false;
let isMemePlaying = false;

puppetMusic.volume = 0.15;
puppetDancing.volume = 0.15;

document.body.addEventListener('click', () => {
    if (!musicStarted) {
        puppetMusic.play().catch(()=>{});
        musicStarted = true;
    }
}, { once: true });

nose.addEventListener("click", () => {
    clicks++;
    squeak.currentTime = 0;
    squeak.play();

    nose.style.transform = "scale(1.4)";
    setTimeout(() => nose.style.transform = "scale(1)", 120);

    if (clicks >= 5) {
        alt.currentTime = 0;
        alt.play();
        document.body.style.background = "#111";
        setTimeout(() => document.body.style.background = "#080808", 150);
        clicks = 0;
    }
});

setInterval(() => {
    if (musicLevel > 0 && !isMemePlaying) {
        musicLevel -= 0.45;
        musicBar.style.width = musicLevel + "%";

        if (musicLevel < 30) {
            musicBar.classList.add("critical-alert");
        } else {
            musicBar.classList.remove("critical-alert");
        }
    } else if (musicLevel <= 0 && !isMemePlaying) {
        triggerMeme();
    }
}, 100);

document.getElementById("music-box-container").addEventListener("click", () => {
    if (!isMemePlaying) {
        musicLevel = Math.min(musicLevel + 25, 100);
        musicBar.style.width = musicLevel + "%";
    }
});

function triggerMeme() {
    isMemePlaying = true;
    puppetMusic.pause();

    puppetGif.src = puppetGif.src;

    puppetDancing.currentTime = 0;
    puppetDancing.play();

    memeOverlay.style.display = "flex";
}

puppetDancing.addEventListener('ended', () => {
    memeOverlay.style.display = "none";
    musicLevel = 100;
    isMemePlaying = false;
    puppetMusic.play();
});
</script>

</body>
</html>
