<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@luisricardo.dev — links</title>
    <style>
        body {
            margin: 0;
            background: #080808;
            color: #f0f0f0;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 16px;
            overflow-x: hidden;
            transition: background 0.2s;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* AVATAR */
        .avatar-container {
            position: relative;
            width: 76px;
            height: 76px;
            border-radius: 50%;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.18);
            background: #111;
            margin: 0 auto 6px;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #nose {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            top: 34px;
            left: 32px;
            cursor: pointer;
            transition: 0.15s;
            z-index: 10;
        }

        /* MUSIC BOX */
        .music-box-label {
            font-size: 9px;
            color: #444;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #music-box-container {
            width: 100%;
            height: 8px;
            background: #111;
            border: 1px solid #222;
            border-radius: 4px;
            margin-bottom: 24px;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        #music-box-bar {
            width: 100%;
            height: 100%;
            background: #444;
            transition: width 0.1s linear, background 0.3s;
        }

        /* LINKS */
        .links-gap {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .link-card {
            padding: 12px;
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            text-decoration: none;
            color: #fff;
            transition: 0.2s;
        }

        .link-card:hover {
            background: #161616;
            border-color: #444;
            transform: translateY(-2px);
        }

        /* JUMPSCARE OVERLAY */
        #jumpscare {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #jumpscare img {
            height: 100%;
        }

        .footer {
            margin-top: 30px;
            font-size: 10px;
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="avatar-container">
        <img src="https://i.pinimg.com/736x/6d/43/2a/6d432a5422e7daf8dbb2f55ae1b74206.jpg" class="avatar-img" alt="Freddy">
        <div id="nose"></div>
    </div>

    <div style="font-size:10px; color:#333; margin-bottom:14px;">clique no detalhe 👀</div>

    <div style="font-size:20px; font-weight:bold;">@luisricardo.dev</div>
    <div style="font-size:12px; color:#777; margin:8px 0 24px;">sistemas de informação · projetos reais</div>

    <div class="music-box-label">Wind Up Music Box</div>
    <div id="music-box-container" title="Clique para dar corda!">
        <div id="music-box-bar"></div>
    </div>

    <div class="links-gap">
        <a href="https://instagram.com/luisricardo.dev" target="_blank" class="link-card">📱 Instagram</a>
        <a href="https://pin.it/4TDXnlbeu" target="_blank" class="link-card">📌 Pinterest</a>
        <a href="https://music.youtube.com/@th.oyasuumii" target="_blank" class="link-card">🎧 YouTube Music</a>
        <a href="#" target="_blank" class="link-card">🎵 Spotify</a>
        <a href="https://github.com/luizricardo-engsoft" target="_blank" class="link-card">💻 GitHub</a>
        <div class="link-card" style="cursor:default;">💬 Discord: th.lurii</div>
        <a href="mailto:luisricardo12278@gmail.com" class="link-card">✉️ Email</a>
    </div>

    <div class="footer">feito por mim</div>
</div>

<div id="jumpscare">
    <img src="https://i.imgur.com/G4i3vS0.png" alt="Puppet Jumpscare">
</div>

<audio id="squeak" src="soundfreddy.mp3"></audio>
<audio id="altSound" src="hor hor hor hor.freddy.mp3"></audio>
<audio id="puppetMusic" src="puppet_music.mp3" loop></audio>
<audio id="jumpscareSound" src="jumpscare_sound.mp3"></audio>

<script>
    const nose = document.getElementById("nose");
    const squeak = document.getElementById("squeak");
    const alt = document.getElementById("altSound");
    const puppetMusic = document.getElementById("puppetMusic");
    const jumpscareSound = document.getElementById("jumpscareSound");
    const musicBar = document.getElementById("music-box-bar");
    const jumpscareDiv = document.getElementById("jumpscare");

    let clicks = 0;
    let musicLevel = 100;
    let musicStarted = false;

    // Configurar volume baixo para a música da Puppet
    puppetMusic.volume = 0.15; 
    jumpscareSound.volume = 0.5;

    // Iniciar música no primeiro clique na página (limitação do navegador)
    document.body.addEventListener('click', () => {
        if (!musicStarted) {
            puppetMusic.play().catch(e => console.log("Áudio aguardando interação"));
            musicStarted = true;
        }
    }, { once: true });

    // Lógica do Nariz
    nose.addEventListener("click", () => {
        clicks++;
        squeak.currentTime = 0;
        squeak.play();

        nose.style.transform = "scale(1.4)";
        setTimeout(() => nose.style.transform = "scale(1)", 120);

        if (clicks >= 5) {
            alt.currentTime = 0;
            alt.play();
            document.body.style.background = "#111";
            setTimeout(() => document.body.style.background = "#080808", 150);
            clicks = 0;
        }
    });

    // Lógica da Music Box
    setInterval(() => {
        if (musicLevel > 0) {
            musicLevel -= 0.2; // Velocidade da descarga
            musicBar.style.width = musicLevel + "%";

            // Alerta visual quando está acabando
            if (musicLevel < 25) {
                musicBar.style.background = "#800";
            } else {
                musicBar.style.background = "#444";
            }
        } else {
            triggerJumpscare();
        }
    }, 100);

    document.getElementById("music-box-container").addEventListener("click", () => {
        musicLevel = Math.min(musicLevel + 20, 100);
        musicBar.style.width = musicLevel + "%";
    });

    function triggerJumpscare() {
        musicLevel = 100; // Reseta para não entrar em loop infinito
        puppetMusic.pause();
        jumpscareSound.play();
        jumpscareDiv.style.display = "flex";
        
        setTimeout(() => {
            jumpscareDiv.style.display = "none";
            puppetMusic.play();
        }, 1500);
    }
</script>

</body>
</html>
