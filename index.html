<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@luisricardo.dev — links</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #080808;
    color: #f0f0f0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
}

.container {
    width: 100%;
    max-width: 400px;
    text-align: center;
}

/* Avatar */
.avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 16px;
    border: 1px solid rgba(255,255,255,0.15);
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

.avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Textos */
.username {
    font-size: 20px;
    font-weight: 600;
}

.bio {
    font-size: 13px;
    color: #777;
    margin: 8px 0 24px;
}

/* Links */
.links {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.link {
    display: block;
    padding: 14px;
    background: #111;
    border: 1px solid #222;
    border-radius: 10px;
    text-decoration: none;
    color: #fff;
    transition: all 0.2s ease;
}

.link:hover {
    background: #161616;
    border-color: #444;
    transform: translateY(-2px);
}

/* Footer */
.footer {
    margin-top: 24px;
    font-size: 11px;
    color: #333;
}
</style>
</head>

<body>

<div class="container">

    <!-- Avatar -->
    <div class="avatar">
        <img 
        src="https://i.pinimg.com/736x/48/6c/84/486c84575e4b3e8b9dc4f4e491880c5d.jpg"
        onerror="this.style.display='none'; this.parentElement.innerHTML='LR';"
        >
    </div>

    <!-- Nome -->
    <div class="username">@luisricardo.dev</div>

    <!-- Bio -->
    <div class="bio">
        sistemas de informação · projetos reais
    </div>

    <!-- Links -->
    <div class="links">

            📱 Instagram
        </a>

        <a href="https://pin.it/4TDXnlbeu" target="_blank" rel="noopener noreferrer" class="link">
            📌 Pinterest

        <a href="https://music.youtube.com/@th.oyasuumii" target="_blank" rel="noopener noreferrer" class="link">

        <!-- SPOTIFY CORRIGIDO -->

        <a href="https://github.com/luizricardo-engsoft" target="_blank" rel="noopener noreferrer" class="link">

</div>
